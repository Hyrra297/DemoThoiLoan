plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'vn.thoiloan.demo'

    defaultConfig {
        applicationId "vn.thoiloan.demo"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
